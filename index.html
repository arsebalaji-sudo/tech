<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Test Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            font-size: 2rem;
            font-weight: bold;
        }

        .container {
            padding: 50px 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<header>
    🚀 My First GitHub Project
</header>

<div class="container">
    <div class="card">
        <h2>Hello, I'm Balaji</h2>
        <p>This is a test HTML project hosted on GitHub.</p>

        <button onclick="showMessage()">Click Me</button>

        <p id="message" style="margin-top:15px;"></p>
    </div>
</div>

<footer>
    © 2026 | Built for GitHub Testing
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText = "🔥 JavaScript is working!";
    }
</script>

</body>
</html>
