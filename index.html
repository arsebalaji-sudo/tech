<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Chess • Final</title>
<style>
:root{
  --light:#f0d9b5; --dark:#b58863;
}
body{margin:0;font-family:Arial;background:#0f172a;color:white;
 display:flex;justify-content:center;align-items:center;height:100vh}
.container{display:flex;gap:20px}
#board{display:grid;grid-template-columns:repeat(8,70px);
 grid-template-rows:repeat(8,70px);
 border-radius:10px;overflow:hidden;
 box-shadow:0 20px 60px rgba(0,0,0,.6)}
.square{display:flex;align-items:center;justify-content:center;
 font-size:36px;cursor:pointer;transition:.15s}
.light{background:var(--light)}
.dark{background:var(--dark)}
.square:hover{filter:brightness(1.1)}
.sel{outline:3px solid cyan}
.move{box-shadow:inset 0 0 0 4px rgba(0,255,255,.3)}
.white-piece{color:#ffffff;text-shadow:0 0 5px #fff}
.black-piece{color:#000000;text-shadow:0 0 3px #000}
.panel{width:220px}
button{padding:10px;border:none;border-radius:8px;margin:5px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div id="board"></div>
  <div class="panel">
    <h3>♟️ Chess</h3>
    <p id="turn">White</p>
    <button onclick="reset()">New</button>
    <button onclick="undo()">Undo</button>
  </div>
</div>
<script>
const B=document.getElementById('board');
const turnEl=document.getElementById('turn');
let turn='w', sel=null, hist=[];

const P={p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',
         P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};

let g;

function reset(){
 g=[
 ['r','n','b','q','k','b','n','r'],
 ['p','p','p','p','p','p','p','p'],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['P','P','P','P','P','P','P','P'],
 ['R','N','B','Q','K','B','N','R']
 ];
 turn='w'; sel=null; hist=[]; draw();
}

function draw(){ B.innerHTML='';
 for(let r=0;r<8;r++)for(let c=0;c<8;c++){
  const s=document.createElement('div');
  s.className='square '+(((r+c)%2)?'dark':'light');
  const p=g[r][c];
  if(p){
    const span=document.createElement('span');
    span.textContent=P[p];
    span.className = (p===p.toUpperCase())?'white-piece':'black-piece';
    s.appendChild(span);
  }
  s.onclick=()=>click(r,c);
  B.appendChild(s);
 }
 turnEl.textContent = turn==='w'?'White':'Black';
}

function isW(p){return p===p.toUpperCase();}

function click(r,c){
 if(sel){
   g[r][c]=g[sel.r][sel.c];
   g[sel.r][sel.c]='';
   turn = turn==='w'?'b':'w';
   sel=null; draw(); return;
 }
 if(!g[r][c]) return;
 if((turn==='w'&&isW(g[r][c]))||(turn==='b'&&!isW(g[r][c]))){
   sel={r,c};
 }
}

function undo(){ if(!hist.length)return; g=hist.pop(); draw(); }

reset();
</script>
</body>
</html>
